name: Claude Code Base Action

on:
  # 1. 允许手动触发
  workflow_dispatch:
    inputs:
      prompt:
        description: "给 Claude 的提示词"
        required: true
        default: "请帮我简要分析这个项目结构"

  # 2. 当 PR 被打开时自动触发
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude-task:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
      - name: 判断是否提及claude
        id: check_mention
        run: |
           COMMENT="${{ github.event.comment.body }}"
           if echo "$COMMENT" | grep -iE "@claude" > /dev/null; then
             echo "trigger=true" >> $GITHUB_OUTPUT
             # 把 @claude 去掉，剩下的作为问题
             PROMPT=$(echo "$COMMENT" | sed -E 's/@claude//gi')
             echo "prompt=$PROMPT" >> $GITHUB_OUTPUT
           else
             echo "trigger=false" >> $GITHUB_OUTPUT
           fi
      - name: 运行 Claude Code Base
        if: steps.check_mention.outputs.trigger == 'true'
        uses: anthropics/claude-code-base-action@beta
        id: claude
        env:
          ANTHROPIC_BASE_URL: https://www.elbnt.ai
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-opus-4-6"
          allowed_tools: "Bash(git:*),View,GlobTool,GrepTool,BatchTool"
          system_prompt: |
            你是专业代码审查助手。
          prompt: |
            请审查这个PR的代码，给出改进建议。
          max_tokens: 65536
          temperature: 0.7
      - name: Extract and Comment PR Review
        if: steps.claude.outputs.conclusion == 'success'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const executionFile = '${{ steps.claude.outputs.execution_file }}';
            const executionLog = JSON.parse(fs.readFileSync(executionFile, 'utf8'));

            // Extract the review content from the execution log
            // The execution log contains the full conversation including Claude's responses
            let review = '';
            // 适配你真实的 JSON 结构
            for (const item of executionLog) {
              // 直接取最终结果
              if (item.type === 'result' && item.subtype === 'success') {
                review = item.result;
              }
              // 兜底：从 assistant 消息取
              if (item.type === 'assistant' && item.message?.content?.[0]?.text) {
                review = item.message.content[0].text;
              }
            }
            console.log("拿到的 review 内容：", review);
            if (review) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "🤖 Claude 分析结果\n\n" + review + "\n\n*Generated by Claude Code*"
              });
            }
