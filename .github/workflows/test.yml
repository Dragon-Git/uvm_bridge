name: Test

on:
  push:
    branches: [ "main" ]
    tags: ["*"]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-26]
    steps:
    - uses: actions/checkout@v7

    - name: Cache verilator (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v6
      env:
        cache-name: cache-verilator-new
      with:
        path: /home/runner/work/verilator
        key: verilator-v5${{ env.cache-name }}

    - name: Install dependencies on Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends help2man make g++ perl python3 autoconf flex bison libfl2 libfl-dev zlib1g zlib1g-dev
        sudo bash ./script/install_verilator.sh

    - name: Install dependencies on macOS (arm64)
      if: matrix.os == 'macos-26'
      run: |
        brew update
        brew install verilator

    - name: Clone verilator-uvm repository
      run: |
        git clone https://github.com/Dragon-Git/uvm-verilator.git
        cd uvm-verilator
        git checkout patch

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install . -v
        python -m pip install cocotb==2.0.0

    - name: Lint with ruff
      uses: chartboost/ruff-action@v1

    - name: Run base test
      run: |
        make -f test/base_test/Makefile run

    - name: Run cocotb test
      run: |
        make -f test/cocotb_test/Makefile run
