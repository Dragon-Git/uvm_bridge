name: Test

on:
  push:
    branches: [ "main" ]
    tags: ["*"]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-26]
    steps:
    - uses: actions/checkout@v7

    - name: Cache verilator (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v6
      env:
        cache-name: cache-verilator-new
      with:
        path: /home/runner/work/verilator
        key: verilator-v5${{ env.cache-name }}

    - name: Install dependencies on Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends help2man make g++ perl python3 autoconf flex bison libfl2 libfl-dev zlib1g zlib1g-dev
        sudo bash ./script/install_verilator.sh

    - name: Install dependencies on macOS (arm64)
      if: matrix.os == 'macos-26'
      run: |
        brew update
        brew install verilator

    - name: Clone verilator-uvm repository
      run: |
        git clone https://github.com/Dragon-Git/uvm-verilator.git
        cd uvm-verilator
        git checkout patch

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install . -v
        python -m pip install cocotb==2.0.0

    - name: Lint with ruff
      uses: chartboost/ruff-action@v1

    - name: Run base test
      run: |
        make -f test/base_test/Makefile run

    - name: Run cocotb test
      run: |
        make -f test/cocotb_test/Makefile run

  windows-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install CMake and Ninja
      run: |
        python -m pip install cmake ninja

    - name: Add MSVC to PATH
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache verilator (Windows)
      uses: actions/cache@v6
      env:
        cache-name: cache-verilator-windows
      with:
        path: D:\a\verilator
        key: verilator-windows-v7-debug-${{ env.cache-name }}

    - name: Cache winflexbison (Windows)
      uses: actions/cache@v6
      env:
        cache-name: cache-winflexbison
      with:
        path: D:\a\winflexbison
        key: winflexbison-v2.5.25-${{ env.cache-name }}

    - name: Install Verilator from source
      shell: pwsh
      run: |
        ./script/install_verilator_windows.ps1
        "VERILATOR_ROOT=D:\a\verilator\install" >> $env:GITHUB_ENV
        "D:\a\verilator\install\bin" >> $env:GITHUB_PATH

    - name: Clone verilator-uvm repository
      run: |
        git clone https://github.com/Dragon-Git/uvm-verilator.git
        cd uvm-verilator
        git checkout patch

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install . -v
        python -m pip install cocotb==2.0.0

    - name: Verify package installation
      run: |
        python -c "import svuvm; print('svuvm imported successfully')"

    - name: Build base test
      run: |
        cmake -S test/base_test -B build_base_test -G Ninja
        cmake --build build_base_test --target build

    - name: Diagnose verilator crash (cdb backtrace)
      if: failure()
      shell: pwsh
      run: |
        # The build target crashes verilator_bin.exe with an "Access violation".
        # Run the exact same verilate command under cdb to capture the real
        # exception code (0xC00000FD = stack overflow vs 0xC0000005 = access
        # violation) and a stack trace, so we stop guessing.
        $ErrorActionPreference = "Continue"
        # Locate cdb from the Windows SDK.
        $cdb = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe" -ErrorAction SilentlyContinue
        if (-not $cdb) { $cdb = Get-ChildItem "C:\Program Files*\Windows Kits\*\Debuggers\x64\cdb.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 }
        Write-Host "cdb = $($cdb.FullName)"
        # Re-run the build verbosely to capture the exact verilator command line.
        Remove-Item build_base_test/build/Vtop* -ErrorAction SilentlyContinue
        $verbose = & cmake --build build_base_test --target build --verbose 2>&1 | Out-String
        Write-Host "===== verbose build output ====="
        Write-Host $verbose
        # Extract the verilator_bin.exe invocation line.
        $line = ($verbose -split "`n") | Where-Object { $_ -match "verilator_bin\.exe" } | Select-Object -First 1
        Write-Host "===== verilate command ====="
        Write-Host $line
        if ($cdb -and $line) {
          # Pull out everything from verilator_bin.exe onward as the child command.
          $idx = $line.IndexOf("verilator_bin.exe")
          $cmd = $line.Substring($idx)
          Write-Host "===== running under cdb ====="
          $env:VERILATOR_ROOT = "D:\a\verilator\install"
          # -g/-G ignore initial/final breakpoints; -o debugs child processes
          # (verilator_bin.exe spawned by cmd.exe); -c runs, prints exception
          # record (.lastevent), stack (kb), then quits.
          # NOTE: no "--" separator -- cdb.exe does not support it.
          & $cdb.FullName -g -G -o -c ".lastevent; kb; q" cmd /c "$cmd" 2>&1 | Out-String | Write-Host
        }

    - name: Run base test
      run: |
        cmake --build build_base_test --target run

    - name: Build cocotb test
      run: |
        cmake -S test/cocotb_test -B build_cocotb_test -G Ninja
        cmake --build build_cocotb_test --target build

    - name: Run cocotb test
      run: |
        cmake --build build_cocotb_test --target run